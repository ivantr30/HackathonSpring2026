{% extends 'base.html' %}
{% load static %}

{% block title %}Прямой эфир{% endblock %} 

{% block extra_css %}
<style>
    /* ========== Player Page Styles ========== */
    .player-container {
        display: grid;
        grid-template-columns: 2fr 1fr; /* Плеер шире, чат уже */
        gap: 30px;
        align-items: start;
        max-width: 1200px;
        margin: 0 auto;
    }

    .panel {
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    .panel h2 {
        font-size: 20px;
        color: #333;
        border-bottom: 2px solid #f0f4f8;
        padding-bottom: 10px;
        margin-bottom: 20px;
    }

    /* === Media Screen (Audio/Video) === */
    .media-screen {
        width: 100%;
        height: 400px;
        background: #111827; /* Темный экран */
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        margin-bottom: 25px;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }

    .audio-visualizer {
        font-size: 80px;
        animation: pulse 2s infinite;
        display: block; /* По умолчанию показываем аудио-заглушку */
    }

    .live-badge {
        position: absolute;
        top: 15px;
        left: 15px;
        background: #ff4d4d;
        color: white;
        padding: 4px 10px;
        border-radius: 5px;
        font-size: 12px;
        font-weight: bold;
        animation: blink 2s infinite;
    }

    /* Видео скрыто по умолчанию */
    #video-player {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: none; 
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
    }
    @keyframes blink { 50% { opacity: 0.7; } }

    /* === Controls === */
    .controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #f8fafc;
        padding: 15px 25px;
        border-radius: 10px;
    }

    .play-btn-wrapper {
        display: flex;
        gap: 15px;
    }

    .btn-circle {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: none;
        font-size: 24px;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s, filter 0.2s;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .btn-circle:hover { transform: scale(1.05); filter: brightness(1.1); }
    .btn-play { background: rgb(116, 211, 255); }
    .btn-pause { background: #ff4d4d; }

    .volume-control {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 200px;
    }
    .volume-control input[type="range"] {
        width: 100%;
        accent-color: rgb(116, 211, 255);
    }

    /* === Forms & Buttons === */
    .form-group { margin-bottom: 15px; }
    textarea.form-control {
        width: 100%;
        height: 100px;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        resize: none;
        font-family: inherit;
    }
    
    .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s ease;
        color: white;
    }
    .btn-primary { background: rgb(116, 211, 255); }
    .btn-primary:hover { background: rgb(90, 190, 240); }
    .btn-danger { background: #ff4d4d; }
    .btn-danger:hover { background: #e60000; }
    .btn-success { background: #2ecc71; }

    /* Голосовое управление */
    .voice-status {
        font-size: 13px;
        color: #666;
        text-align: center;
        margin-bottom: 10px;
        height: 18px;
    }
    .voice-controls { display: flex; gap: 10px; }
    .voice-controls .btn { flex: 1; }
</style>
{% endblock %}

{% block content %}
<div class="player-container">
    
    <!-- ЛЕВАЯ КОЛОНКА: ПЛЕЕР -->
    <div class="panel">
        <h2>📻 Слушать эфир</h2>

        <!-- ТЗ: Модуль представляет собой интерфейс слушателя с потоковым аудио/видео -->
        <div class="media-screen">
            <span class="live-badge">LIVE</span>
            
            <!-- Заглушка, когда играет только аудио -->
            <div id="audio-visualizer" class="audio-visualizer">🎙️</div>
            
            <!-- Доп. ТЗ 1: Воспроизведение видео -->
            <video id="video-player" src=""></video>
        </div>

        <!-- Скрытый аудиоплеер -->
        <audio id="audio-player" src=""></audio>

        <!-- ТЗ: Элементы управления -->
        <div class="controls">
            <div class="play-btn-wrapper">
                <button id="btn-play" class="btn-circle btn-play" onclick="playMedia()" title="Воспроизвести">▶</button>
                <button id="btn-pause" class="btn-circle btn-pause" onclick="pauseMedia()" style="display: none;" title="Поставить на паузу">⏸</button>
            </div>

            <div class="volume-control">
                <span>🔈</span>
                <!-- ТЗ: Отрегулировать громкость (ползунок) -->
                <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5" oninput="changeVolume(this.value)">
                <span>🔊</span>
            </div>
        </div>
    </div>

    <!-- ПРАВАЯ КОЛОНКА: ОБРАТНАЯ СВЯЗЬ С ВЕДУЩИМ -->
    <div class="panel">
        <h2>✉️ Написать в студию</h2>

        <!-- ТЗ: Отправка сообщения ведущему (Текст) -->
        <form method="POST" action="#" class="form-group">
            {% csrf_token %}
            <textarea name="text" class="form-control" placeholder="Ваше сообщение ведущему..."></textarea>
            <button type="submit" class="btn btn-primary" style="margin-top: 10px;">Отправить текст</button>
        </form>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0;">

        <!-- Доп. ТЗ 2: Запись голосового сообщения -->
        <h3 style="font-size: 16px; margin-bottom: 15px; color: #333;">🎙️ Голосовое сообщение</h3>
        <p id="voice-status" class="voice-status">Нажмите "Записать голос"</p>
        
        <div class="voice-controls">
            <button id="btn-record-start" class="btn btn-danger" onclick="startRecording()">⏺ Записать</button>
            <button id="btn-record-stop" class="btn btn-primary" onclick="stopRecording()" style="display: none;">⏹ Остановить</button>
            <button id="btn-record-send" class="btn btn-success" onclick="sendRecording()" style="display: none;">📤 Отправить</button>
        </div>
    </div>

</div>

<!-- БАЗОВЫЕ СКРИПТЫ УПРАВЛЕНИЯ ИНТЕРФЕЙСОМ -->
<script>
    const audioPlayer = document.getElementById('audio-player');
    const videoPlayer = document.getElementById('video-player');
    const btnPlay = document.getElementById('btn-play');
    const btnPause = document.getElementById('btn-pause');
    const audioVisualizer = document.getElementById('audio-visualizer');

    let isVideoMode = false; // Флаг: играет видео или аудио

    // ТЗ: Включение воспроизведения
    function playMedia() {
        if (isVideoMode) {
            videoPlayer.play();
        } else {
            audioPlayer.play();
        }
        btnPlay.style.display = 'none';
        btnPause.style.display = 'flex';
    }

    // ТЗ: Пауза
    function pauseMedia() {
        if (isVideoMode) {
            videoPlayer.pause();
        } else {
            audioPlayer.pause();
        }
        btnPause.style.display = 'none';
        btnPlay.style.display = 'flex';
    }

    // ТЗ: Ползунок громкости
    function changeVolume(value) {
        audioPlayer.volume = value;
        videoPlayer.volume = value;
    }

    // Доп. ТЗ 1: Автоматическое переключение на видео (Вызовешь эту функцию из сокетов)
    function switchToVideo(videoUrl) {
        isVideoMode = true;
        audioPlayer.pause();
        audioVisualizer.style.display = 'none';
        videoPlayer.style.display = 'block';
        videoPlayer.src = videoUrl;
        playMedia();
    }

    function switchToAudio(audioUrl) {
        isVideoMode = false;
        videoPlayer.pause();
        videoPlayer.style.display = 'none';
        audioVisualizer.style.display = 'block';
        audioPlayer.src = audioUrl;
        playMedia();
    }

    // ==========================================
    // Доп. ТЗ 2: ЗАПИСЬ ГОЛОСОВОГО СООБЩЕНИЯ
    // ==========================================
    let mediaRecorder;
    let audioChunks = [];
    let voiceBlob = null;

    const btnRecStart = document.getElementById('btn-record-start');
    const btnRecStop = document.getElementById('btn-record-stop');
    const btnRecSend = document.getElementById('btn-record-send');
    const voiceStatus = document.getElementById('voice-status');

    async function startRecording() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            
            mediaRecorder.onstop = () => {
                voiceBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                voiceStatus.innerText = "Запись готова! Можно отправлять.";
                btnRecStop.style.display = 'none';
                btnRecSend.style.display = 'block';
                
                // Отключаем микрофон
                stream.getTracks().forEach(track => track.stop());
            };

            mediaRecorder.start();
            voiceStatus.innerText = "🔴 Идет запись...";
            voiceStatus.style.color = "#ff4d4d";
            
            btnRecStart.style.display = 'none';
            btnRecStop.style.display = 'block';

        } catch (err) {
            alert("Ошибка доступа к микрофону. Проверьте разрешения браузера.");
        }
    }

    function stopRecording() {
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            voiceStatus.style.color = "#333";
        }
    }

    function sendRecording() {
        if (!voiceBlob) return;
        
        voiceStatus.innerText = "⏳ Отправка...";
        
        // Здесь ты добавишь логику fetch/WebSocket для отправки voiceBlob на сервер
        /* 
        const formData = new FormData();
        formData.append('voice_message', voiceBlob, 'message.mp3');
        fetch('/api/send_voice/', { method: 'POST', body: formData })
        */
        
        setTimeout(() => {
            voiceStatus.innerText = "✅ Успешно отправлено!";
            voiceStatus.style.color = "#2ecc71";
            btnRecSend.style.display = 'none';
            btnRecStart.style.display = 'block';
            voiceBlob = null;
        }, 1000);
    }
</script>
{% endblock %}
