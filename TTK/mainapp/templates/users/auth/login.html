{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="welcome-card">
    <h1>Вход в TTKstream</h1>
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <input type="text" name="username" placeholder="Логин или Email" required style="width: 100%; padding: 10px;">
        </div>
        <div style="margin-bottom: 15px;">
            <input type="password" name="password" placeholder="Пароль" required style="width: 100%; padding: 10px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>
                <input type="checkbox" name="remember_me"> Запомнить меня
            </label>
        </div>
        <button type="submit" style="width: 100%; padding: 10px; background: #667eea; color: white; border: none; border-radius: 5px;">Войти</button>
    </form>
    <p style="margin-top: 20px;">Нет аккаунта? <a href="{% url 'mainapp:users:register' %}">Зарегистрироваться</a></p>
</div>
{% endblock %}
