{% load static %}
<div class="modal-content">
    <h3>Сменить пароль для {{ user.username }}</h3>
    <form method="post" action="{% url 'change_password' user.id %}" class="ajax-form">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button type="submit" class="btn-save">Изменить пароль</button>
            <button type="button" class="btn-cancel" onclick="closeModal('change-password')">Отмена</button>
        </div>
    </form>
</div>
