{% load static %}
<div class="modal-content">
    <h3>Редактировать пользователя {{ user.username }}</h3>
    <form method="post" action="{% url 'edit_user' user.id %}" class="ajax-form">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button type="submit" class="btn-save">Сохранить</button>
            <button type="button" class="btn-cancel" onclick="closeModal('edit-user')">Отмена</button>
        </div>
    </form>
</div>
